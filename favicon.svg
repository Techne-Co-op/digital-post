<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark ground -->
  <rect width="32" height="32" rx="6" fill="#0f0f0f"/>
  <!-- Stamp body: terra border -->
  <rect x="5" y="5" width="22" height="22" rx="2" fill="none" stroke="#c4956a" stroke-width="1.5"/>
  <!-- Perforation notches top & bottom -->
  <rect x="8"  y="3.5" width="2" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="14" y="3.5" width="2" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="20" y="3.5" width="2" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="8"  y="25.5" width="2" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="14" y="25.5" width="2" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="20" y="25.5" width="2" height="3" rx="1" fill="#0f0f0f"/>
  <!-- Perforation notches left & right -->
  <rect x="3.5" y="8"  width="3" height="2" rx="1" fill="#0f0f0f"/>
  <rect x="3.5" y="14" width="3" height="2" rx="1" fill="#0f0f0f"/>
  <rect x="3.5" y="20" width="3" height="2" rx="1" fill="#0f0f0f"/>
  <rect x="25.5" y="8"  width="3" height="2" rx="1" fill="#0f0f0f"/>
  <rect x="25.5" y="14" width="3" height="2" rx="1" fill="#0f0f0f"/>
  <rect x="25.5" y="20" width="3" height="2" rx="1" fill="#0f0f0f"/>
  <!-- DP monogram -->
  <text x="16" y="20" text-anchor="middle" font-family="serif" font-size="11" font-weight="700" fill="#c4956a" letter-spacing="0.5">DP</text>
</svg>
